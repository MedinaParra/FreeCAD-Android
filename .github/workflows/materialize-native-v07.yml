name: Materialize Native v0.7

on:
  workflow_dispatch:

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: freecad-native-v07
      - name: Restore staged native headers
        run: |
          mkdir -p app/src/main/cpp
          printf '%s' '' | base64 -d > app/src/main/cpp/PythonRuntime.hpp
      - name: Verify
        run: test -s app/src/main/cpp/PythonRuntime.hpp
